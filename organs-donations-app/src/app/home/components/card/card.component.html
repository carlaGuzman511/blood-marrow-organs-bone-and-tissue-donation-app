<ng-container *ngFor="let item of items">
  <mat-card class="card" appearance="outlined">
    <mat-card-header>
      <img class="avatar" [src]="item.user?.image || item.donationCenter?.image || 'https://via.placeholder.com/600x300?text=Sin+Imagen'" alt="Donation image">

      <div>
        <mat-card-title>{{ item.user?.fullName || item.donationCenter?.name }}</mat-card-title>
        <mat-card-subtitle>
          {{ item.createdAt | date:'short' }}
        </mat-card-subtitle>
        <mat-card-subtitle>
          Donacion de {{ item.donationType?.name }}
        </mat-card-subtitle>
      </div>        

      <!-- <button *ngIf="item.userId === currentUserId" -->
      <button
        mat-icon-button
        [matMenuTriggerFor]="menu"
        aria-label="More options">
        <mat-icon>more_vert</mat-icon>
      </button>

      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="editItem(item)">
          <mat-icon>edit</mat-icon>
          <span>Editar</span>
        </button>
        <button mat-menu-item (click)="removeItem(item)">
          <mat-icon>delete</mat-icon>
          <span>Eliminar</span>
        </button>
      </mat-menu>
    </mat-card-header>

    <mat-card-content>
      <p>{{ item.description }}</p>
    </mat-card-content>

    <img mat-card-image [src]="item.image || 'https://via.placeholder.com/600x300?text=Sin+Imagen'" alt="Donation image">

    <div class="card-stats">
      <span>👍 24</span>
      <span>🔄 5</span>
    </div>

    <mat-card-actions>
      <button mat-button>
        👍 Me gusta
      </button>
      <button mat-button>
        💬 Comentar
      </button>
      <button mat-button>
        🔄 Compartir
      </button>
    </mat-card-actions>

    <div class="comments" *ngFor="let comment of item.comments">
      <div class="comment">
        <strong>{{ comment.user?.fullName }}</strong>    
        <div>
          {{ item.createdAt | date:'short' }}
        </div>    
        {{  comment.description }}
      </div>
        <!-- <button *ngIf="item.userId === currentUserId" -->
      <button
        mat-icon-button
        [matMenuTriggerFor]="menu"
        aria-label="More options">
        <mat-icon>more_vert</mat-icon>
      </button>

      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="editComment(item)">
          <mat-icon>edit</mat-icon>
          <span>Editar</span>
        </button>
        <button mat-menu-item (click)="removeComment(item)">
          <mat-icon>delete</mat-icon>
          <span>Eliminar</span>
        </button>
      </mat-menu>
    </div>

  </mat-card>
</ng-container>
