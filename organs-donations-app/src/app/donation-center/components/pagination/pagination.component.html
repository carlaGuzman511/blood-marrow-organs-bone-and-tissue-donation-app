<div class="pagination">
  <button mat-button (click)="prev()">Anterior</button>
  <button
    mat-button
    *ngFor="let p of [].constructor(totalPages); let i = index"
    (click)="goTo(i)"
    [disabled]="i === currentPage">
    {{ i + 1 }}
  </button>
  <button mat-button (click)="next()">Siguiente</button>
</div>
